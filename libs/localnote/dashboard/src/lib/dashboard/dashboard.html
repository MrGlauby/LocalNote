<p>Dashboard</p>

<nl-button label="Primary"></nl-button>

<nl-button label="Secondary" variant="secondary"></nl-button>

<nl-button label="Disabled" [disabled]="true"></nl-button>

<p>Anzahl der Notizen: {{ noteCount() }}</p>

@for (note of notes(); track note.id) {
<div
  [routerLink]="['/notes', note.id]"
  style="cursor: pointer; padding: 5px; border-bottom: 1px solid #eee"
>
  {{ note.title || 'Unbekannte Notiz'}}
</div>
}

<lib-notes-create></lib-notes-create>
